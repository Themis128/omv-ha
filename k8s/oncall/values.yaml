base_url: oncall.cloudless.gr
base_url_protocol: https

# ── Grafana ──────────────────────────────────────────────────────────────────
# Disable bundled Grafana — use existing kube-prometheus-stack instance
grafana:
  enabled: false

externalGrafana:
  url: http://kube-prom-grafana.monitoring.svc.cluster.local

# ── Broker: Redis (lighter than RabbitMQ) ────────────────────────────────────
broker:
  type: redis

rabbitmq:
  enabled: false

# ── Broker: Redis (standalone deployment, official image) ────────────────────
# NOTE: Redis is deployed separately as redis:7-alpine (Bitnami arm64 issues)
# See k8s-temp/oncall-deps.yaml for the standalone StatefulSet + Service
redis:
  enabled: false

externalRedis:
  host: oncall-redis.oncall.svc.cluster.local
  port: 6379
  # Password sourced from k8s secret (key: redis-password) — never inline.
  # Create with: k8s/oncall/scripts/create-oncall-secrets.sh
  existingSecret: oncall-redis-external
  passwordKey: redis-password

# ── Database: MariaDB (standalone deployment, official image) ─────────────────
# NOTE: MariaDB is deployed separately as mariadb:11 (Bitnami arm64 issues)
# See k8s-temp/oncall-deps.yaml for the standalone StatefulSet + Service
database:
  type: mysql

mariadb:
  enabled: false

externalMysql:
  host: oncall-mariadb.oncall.svc.cluster.local
  port: 3306
  db_name: oncall
  user: oncall
  # Password sourced from k8s secret (key: mariadb-root-password) — never inline.
  # Create with: k8s/oncall/scripts/create-oncall-secrets.sh
  existingSecret: oncall-mysql-external

# ── Engine ────────────────────────────────────────────────────────────────────
engine:
  replicaCount: 1
  nodeSelector:
    kubernetes.io/hostname: omv
  resources:
    requests:
      memory: 200Mi
      cpu: 100m
    limits:
      memory: 500Mi
      cpu: 500m

# ── Celery workers ────────────────────────────────────────────────────────────
celery:
  replicaCount: 1
  nodeSelector:
    kubernetes.io/hostname: omv
  resources:
    requests:
      memory: 200Mi
      cpu: 50m
    limits:
      memory: 400Mi
      cpu: 400m

# ── DB migration job ──────────────────────────────────────────────────────────
migrate:
  nodeSelector:
    kubernetes.io/hostname: omv

# ── Ingress: disabled — we create our own Traefik Ingress + cert-manager cert ─
ingress:
  enabled: false

ingress-nginx:
  enabled: false

cert-manager:
  enabled: false
