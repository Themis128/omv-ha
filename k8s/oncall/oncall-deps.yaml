apiVersion: v1
kind: Namespace
metadata:
  name: oncall
---
# NOTE: The oncall-mariadb-secret / oncall-mysql-external / oncall-redis-external
# secrets are NOT defined here — they are generated (never committed as plaintext).
# Run this BEFORE `kubectl apply -f k8s/oncall/oncall-deps.yaml`:
#   bash k8s/oncall/scripts/create-oncall-secrets.sh
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: oncall-mariadb
  namespace: oncall
spec:
  serviceName: oncall-mariadb
  replicas: 1
  selector:
    matchLabels:
      app: oncall-mariadb
  template:
    metadata:
      labels:
        app: oncall-mariadb
    spec:
      nodeSelector:
        kubernetes.io/hostname: omv
      containers:
      - name: mariadb
        image: mariadb:11
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: oncall-mariadb-secret
              key: MYSQL_ROOT_PASSWORD
        - name: MYSQL_DATABASE
          value: oncall
        - name: MYSQL_USER
          value: oncall
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: oncall-mariadb-secret
              key: MYSQL_PASSWORD
        ports:
        - containerPort: 3306
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ReadWriteOnce]
      resources:
        requests:
          storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: oncall-mariadb
  namespace: oncall
spec:
  selector:
    app: oncall-mariadb
  ports:
  - port: 3306
    targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oncall-redis
  namespace: oncall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oncall-redis
  template:
    metadata:
      labels:
        app: oncall-redis
    spec:
      nodeSelector:
        kubernetes.io/hostname: omv
      containers:
      - name: redis
        image: redis:7-alpine
        # requirepass sourced from the same secret OnCall connects with
        # (oncall-redis-external/redis-password) — guarantees both sides match.
        command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: oncall-redis-external
              key: redis-password
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 128Mi
            cpu: 200m
---
apiVersion: v1
kind: Service
metadata:
  name: oncall-redis
  namespace: oncall
spec:
  selector:
    app: oncall-redis
  ports:
  - port: 6379
    targetPort: 6379
