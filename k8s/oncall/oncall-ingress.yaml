apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: oncall-gr-tls
  namespace: oncall
spec:
  secretName: oncall-gr-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - oncall.cloudless.gr
---
# ── Webhook ingress (PUBLIC — rate-limited only) ──────────────────────────────
# /integrations/v1/<token>/ paths receive inbound alerts from external sources
# (Prometheus AlertManager, Grafana alerts, etc.)
# Higher router priority wins on path overlap with the admin ingress below.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oncall-webhooks
  namespace: oncall
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.priority: "20"
    traefik.ingress.kubernetes.io/router.middlewares: >-
      oncall-oncall-webhook-chain@kubernetescrd,kube-system-hsts@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: oncall.cloudless.gr
    http:
      paths:
      - path: /integrations/
        pathType: Prefix
        backend:
          service:
            name: oncall-engine
            port:
              number: 8080
  tls:
  - hosts:
    - oncall.cloudless.gr
    secretName: oncall-gr-tls
---
# ── Admin ingress (PROTECTED — rate-limit + basicauth) ───────────────────────
# Covers everything not matched by the webhook ingress above.
# The Grafana plugin uses the internal cluster URL and is NOT affected by this.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oncall
  namespace: oncall
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.priority: "10"
    traefik.ingress.kubernetes.io/router.middlewares: >-
      oncall-oncall-admin-chain@kubernetescrd,kube-system-hsts@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: oncall.cloudless.gr
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: oncall-engine
            port:
              number: 8080
  tls:
  - hosts:
    - oncall.cloudless.gr
    secretName: oncall-gr-tls
