apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: keycloak
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: keycloak
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      nodeSelector:
        kubernetes.io/hostname: omv
      initContainers:
      - name: ssl-init
        image: postgres:16-alpine
        securityContext:
          runAsUser: 0
        command:
        - sh
        - -c
        - |
          cp /ssl-source/tls.crt /ssl/server.crt
          cp /ssl-source/tls.key /ssl/server.key
          chown 70:70 /ssl/server.crt /ssl/server.key
          chmod 644 /ssl/server.crt
          chmod 600 /ssl/server.key
        volumeMounts:
        - name: ssl-source
          mountPath: /ssl-source
          readOnly: true
        - name: ssl-writable
          mountPath: /ssl
      containers:
      - name: postgres
        image: postgres:16-alpine
        args:
        - -c
        - ssl=on
        - -c
        - ssl_cert_file=/var/lib/postgresql/ssl/server.crt
        - -c
        - ssl_key_file=/var/lib/postgresql/ssl/server.key
        - -c
        - wal_compression=zstd
        - -c
        - default_toast_compression=lz4
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: keycloak
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: keycloak-db-secret
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: keycloak-db-secret
              key: password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: ssl-writable
          mountPath: /var/lib/postgresql/ssl
          readOnly: true
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "keycloak", "-d", "keycloak"]
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "keycloak", "-d", "keycloak"]
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: ssl-source
        secret:
          secretName: postgres-tls
      - name: ssl-writable
        emptyDir: {}
