# k3s agent config for omv-ha (Pi 3B, 1 GB)
# omv-ha was demoted from control-plane+etcd to agent-only on 2026-05-24.
# This replaced the old server config (etcd-arg, kube-apiserver-arg, node-taint removed).
# Deploy: copy to /etc/rancher/k3s/config.yaml on omv-ha and restart k3s-agent.

server: https://192.168.1.200:6443   # connect via VIP — survives omv-main IP changes

# kubelet memory limits for Pi 3B (1 GB RAM, ~700 MB allocatable after reservations)
kubelet-arg:
  - "max-pods=20"
  - "eviction-hard=memory.available<200Mi"
  - "eviction-soft=memory.available<300Mi"
  - "eviction-soft-grace-period=memory.available=2m"
  - "system-reserved=cpu=200m,memory=200Mi"
  - "kube-reserved=cpu=200m,memory=300Mi"
