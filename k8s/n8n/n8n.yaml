###############################################################################
# n8n — Workflow automation engine
# Namespace: n8n
# Runs on omv-main (Pi5 8GB) — workflow engine needs stable memory
# Persistent storage: local-path PVC (SQLite-backed, omv-main only)
###############################################################################

apiVersion: v1
kind: Namespace
metadata:
  name: n8n

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-data
  namespace: n8n
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi

# n8n-secrets — DO NOT create this via kubectl apply.
# Create directly on the cluster (never commit real values):
#
#   kubectl create secret generic n8n-secrets -n n8n \
#     --from-literal=N8N_ENCRYPTION_KEY="<generate with: openssl rand -hex 32>" \
#     --from-literal=NOTION_API_TOKEN="ntn_..." \
#     --from-literal=ANTHROPIC_API_KEY="sk-ant-api03-..." \
#     --from-literal=SLACK_WEBHOOK_URL="https://hooks.slack.com/services/..."
#
# ⚠️  ROTATE the following — they were exposed in git history (commit 5d2e355):
#     • ANTHROPIC_API_KEY  → console.anthropic.com → API Keys
#     • NOTION_API_TOKEN   → notion.so/my-integrations
#     • SLACK_WEBHOOK_URL  → api.slack.com/apps → your app → Incoming Webhooks
#     • N8N_ENCRYPTION_KEY → generate new value, migrate existing workflows
#
# After rotating, scrub history:
#   git filter-repo --replace-text <(echo "OLD_KEY==>REDACTED") --force
#   git push origin master --force-with-lease

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n
  labels:
    app: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  strategy:
    type: Recreate           # PVC is RWO — only one pod at a time
  template:
    metadata:
      labels:
        app: n8n
    spec:
      nodeSelector:
        kubernetes.io/hostname: omv  # Pi5 8GB — workflow engine needs memory
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: n8n
          image: n8nio/n8n:1.44.1
          ports:
            - name: http
              containerPort: 5678
          env:
            - name: N8N_HOST
              value: "n8n.cloudless.online"
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: "https"
            - name: WEBHOOK_URL
              value: "https://n8n.cloudless.online/"
            - name: GENERIC_TIMEZONE
              value: "Europe/Athens"
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: N8N_ENCRYPTION_KEY
            - name: NOTION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: NOTION_API_TOKEN
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: ANTHROPIC_API_KEY
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: SLACK_WEBHOOK_URL
            # Disable telemetry
            - name: N8N_DIAGNOSTICS_ENABLED
              value: "false"
            - name: N8N_VERSION_NOTIFICATIONS_ENABLED
              value: "false"
            # SQLite WAL mode for reliability
            - name: DB_TYPE
              value: "sqlite"
            - name: DB_SQLITE_VACUUM_ON_STARTUP
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: n8n-data

---
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: n8n
spec:
  selector:
    app: n8n
  ports:
    - name: http
      port: 5678
      targetPort: 5678

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: n8n-tls
  namespace: n8n
spec:
  secretName: n8n-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - n8n.cloudless.online

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: n8n
  namespace: n8n
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # n8n webhooks can be large — increase body limit
    traefik.ingress.kubernetes.io/router.middlewares: n8n-headers@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - n8n.cloudless.online
      secretName: n8n-tls
  rules:
    - host: n8n.cloudless.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: n8n
                port:
                  number: 5678

---
# Middleware: allow large webhook payloads, set security headers
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: n8n-headers
  namespace: n8n
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
    contentTypeNosniff: true
    browserXssFilter: true
