---
# ── ml-anomaly-detect ─────────────────────────────────────────────────────────
# Score-only: loads cached model, scores latest 15-min window — runs every 15min
# NOTE: Suspends automatically if no model exists in S3 yet (graceful exit)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ml-anomaly-detect
  namespace: analytics
  labels:
    app: ml-pipeline
    job: anomaly-detect
spec:
  schedule: "*/15 * * * *"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 120
      template:
        spec:
          restartPolicy: Never
          nodeSelector:
            kubernetes.io/hostname: omv
          containers:
            - name: anomaly-detect
              image: ghcr.io/themis128/ml-pipeline:latest
              imagePullPolicy: IfNotPresent
              command: ["python", "/scripts/detect_anomaly.py"]
              env:
                - name: DUCKDB_API_URL
                  value: "http://duckdb-api.analytics.svc.cluster.local"
                - name: ANOMALY_ALERT_WEBHOOK
                  value: "http://ntfy.ntfy.svc.cluster.local/analytics-alerts"
              envFrom:
                - secretRef:
                    name: duckdb-api-secrets
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi

---
