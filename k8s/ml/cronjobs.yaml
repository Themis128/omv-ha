###############################################################################
# ML Pipeline CronJobs — Phase 1
# All jobs run on omv (Pi 5, arm64, 8GB).
# All DuckDB access is via duckdb-api REST — no direct PVC mount.
# concurrencyPolicy: Forbid prevents overlapping runs.
# Schedules are staggered to avoid concurrent RAM spikes.
###############################################################################

# ── Shared env vars (referenced in each CronJob) ─────────────────────────────
# - DUCKDB_API_URL  : internal cluster URL of duckdb-api
# - ML_ADMIN_TOKEN  : write-gate token for /execute endpoint
# - AWS_*           : from duckdb-api-secrets (same secret reused)
# - ANALYTICS_S3_BUCKET : from duckdb-api-secrets

---
# ── ml-feature-engineer ───────────────────────────────────────────────────────
# Reads raw tables, computes features, writes Parquet to S3 + DuckDB views
# Schedule: Sunday 01:00 UTC — MUST run before training jobs
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ml-feature-engineer
  namespace: analytics
  labels:
    app: ml-pipeline
    job: feature-engineer
spec:
  schedule: "0 1 * * 0"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 300
      template:
        spec:
          restartPolicy: Never
          nodeSelector:
            kubernetes.io/hostname: omv
          containers:
            - name: feature-engineer
              image: ghcr.io/themis128/ml-pipeline:latest
              imagePullPolicy: IfNotPresent
              command: ["python", "/scripts/feature_engineer.py"]
              env:
                - name: DUCKDB_API_URL
                  value: "http://duckdb-api.analytics.svc.cluster.local"
                - name: DUCKDB_TIMEOUT
                  value: "120"
              envFrom:
                - secretRef:
                    name: duckdb-api-secrets
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: 800m
                  memory: 512Mi

