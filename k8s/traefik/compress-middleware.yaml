apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: compress
  namespace: kube-system
spec:
  compress:
    minResponseBodyBytes: 1024
    # Brotli first (best ratio ~26% better than gzip), then zstd, then gzip fallback
    encodings:
      - br
      - zstd
      - gzip
    includedContentTypes:
      - text/html
      - text/css
      - text/plain
      - text/xml
      - text/javascript
      - application/javascript
      - application/json
      - application/xml
      - application/rss+xml
      - application/atom+xml
      - image/svg+xml
      - font/ttf
      - font/opentype
      - application/x-font-ttf
      - application/wasm
