---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: health-monitor
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: health-monitor
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: health-monitor
subjects:
  - kind: ServiceAccount
    name: health-monitor
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: health-monitor
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: health-monitor
  namespace: kube-system
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 120
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: health-monitor
          restartPolicy: Never
          containers:
            - name: health-monitor
              image: alpine/k8s:1.33.0
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  TIMESTAMP="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
                  TRAEFIK_STATUS="FAIL"
                  APP_INTERNAL_STATUS="FAIL"
                  APP_EXTERNAL_STATUS="FAIL"

                  # ── 1. Check traefik deployment ready replicas ───────────────────────
                  READY_REPLICAS="$(kubectl get deployment traefik -n kube-system \
                    -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo '0')"

                  if [ -z "${READY_REPLICAS}" ] || [ "${READY_REPLICAS}" -lt 1 ]; then
                    echo "[${TIMESTAMP}] ERROR: traefik has ${READY_REPLICAS:-0} ready replicas — restarting"
                    kubectl rollout restart deployment/traefik -n kube-system \
                      && echo "[${TIMESTAMP}] INFO: rollout restart issued for traefik" \
                      || echo "[${TIMESTAMP}] ERROR: failed to restart traefik"
                    TRAEFIK_STATUS="FAIL"
                  else
                    echo "[${TIMESTAMP}] INFO: traefik has ${READY_REPLICAS} ready replica(s)"
                    TRAEFIK_STATUS="OK"
                  fi

                  # ── 2. Check Traefik VIP endpoint ───────────────────────────────────
                  HTTP_CODE="$(curl -sk --max-time 5 -o /dev/null -w '%{http_code}' \
                    https://192.168.1.200:18443/ 2>/dev/null || echo '')"

                  if [ -z "${HTTP_CODE}" ] || [ "${HTTP_CODE}" = "000" ]; then
                    echo "[${TIMESTAMP}] ERROR: Traefik VIP https://192.168.1.200:18443/ did not respond"
                    TRAEFIK_STATUS="FAIL"
                  else
                    echo "[${TIMESTAMP}] INFO: Traefik VIP responded with HTTP ${HTTP_CODE}"
                  fi

                  # ── 3. Check cloudless app internally (bypasses Cloudflare tunnel) ──
                  # Use HTTP status code — the app may redirect HTTP→HTTPS internally,
                  # so status 2xx or 3xx both mean the app is alive and serving.
                  # Only 0 (no connection) or 5xx means the app is actually broken.
                  APP_INTERNAL_CODE="$(curl -s --max-time 8 -o /dev/null -w '%{http_code}' \
                    http://cloudless.cloudless.svc.cluster.local:3000/api/health \
                    2>/dev/null || echo '000')"

                  if [ "${APP_INTERNAL_CODE}" = "000" ] || [ "${APP_INTERNAL_CODE}" -ge 500 ] 2>/dev/null; then
                    echo "[${TIMESTAMP}] ERROR: cloudless internal check FAILED — HTTP ${APP_INTERNAL_CODE}"
                    APP_INTERNAL_STATUS="FAIL"
                  else
                    echo "[${TIMESTAMP}] INFO: cloudless internal check OK — HTTP ${APP_INTERNAL_CODE}"
                    APP_INTERNAL_STATUS="OK"
                  fi

                  # ── 4. Restart cloudless deployment only if truly unreachable ────────
                  if [ "${APP_INTERNAL_STATUS}" = "FAIL" ]; then
                    CLOUDLESS_READY="$(kubectl get deployment cloudless -n cloudless \
                      -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo '0')"
                    echo "[${TIMESTAMP}] ERROR: cloudless internal unreachable (ready=${CLOUDLESS_READY:-0}) — restarting"
                    kubectl rollout restart deployment/cloudless -n cloudless \
                      && echo "[${TIMESTAMP}] INFO: rollout restart issued for cloudless" \
                      || echo "[${TIMESTAMP}] ERROR: failed to restart cloudless"
                  fi

                  # ── 5. Check cloudless externally (validates Cloudflare tunnel) ──────
                  APP_EXTERNAL_RESP="$(curl -sL --max-time 10 \
                    https://cloudless.online/api/health 2>/dev/null || echo '')"

                  if echo "${APP_EXTERNAL_RESP}" | grep -qi 'ok'; then
                    echo "[${TIMESTAMP}] INFO: cloudless.online external check OK"
                    APP_EXTERNAL_STATUS="OK"
                  else
                    echo "[${TIMESTAMP}] ERROR: cloudless.online external check FAILED — response: ${APP_EXTERNAL_RESP:-<no response>}"
                    APP_EXTERNAL_STATUS="FAIL"
                  fi

                  # ── 6. Tunnel-down detection ─────────────────────────────────────────
                  if [ "${APP_INTERNAL_STATUS}" = "OK" ] && [ "${APP_EXTERNAL_STATUS}" = "FAIL" ]; then
                    echo "[${TIMESTAMP}] WARNING: app is healthy internally but unreachable externally — likely Cloudflare tunnel issue"
                  fi

                  # ── 7. Summary ────────────────────────────────────────────────────────
                  echo "[${TIMESTAMP}] health: traefik=${TRAEFIK_STATUS} app_internal=${APP_INTERNAL_STATUS} app_external=${APP_EXTERNAL_STATUS}"
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
