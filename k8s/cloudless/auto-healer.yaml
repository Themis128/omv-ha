apiVersion: v1
kind: ServiceAccount
metadata:
  name: auto-healer
  namespace: cloudless
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: auto-healer
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: auto-healer
subjects:
  - kind: ServiceAccount
    name: auto-healer
    namespace: cloudless
roleRef:
  kind: ClusterRole
  name: auto-healer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: auto-healer
  namespace: cloudless
spec:
  schedule: "*/3 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 120
      template:
        spec:
          serviceAccountName: auto-healer
          restartPolicy: Never
          containers:
            - name: auto-healer
              image: alpine/k8s:1.30.0
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  TS() { date -u +"%Y-%m-%dT%H:%M:%SZ"; }
                  echo "[$(TS)] auto-healer starting"

                  # -- 1. ECR ImagePullBackOff / ErrImagePull (cloudless ns only) --
                  PULL_PODS=$(kubectl get pods -n cloudless \
                    -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{range .status.containerStatuses[*]}{.state.waiting.reason}{"\n"}{end}{end}' \
                    2>/dev/null | grep -E 'ImagePullBackOff|ErrImagePull' | awk '{print $1}' | sort -u || true)

                  if [ -n "$PULL_PODS" ]; then
                    echo "[$(TS)] ECR pull failure: $(echo "$PULL_PODS" | tr '\n' ' ')"
                    JOB="ecr-heal-$(date -u +%s)"
                    kubectl create job "$JOB" --from=cronjob/ecr-cred-refresher -n cloudless
                    echo "[$(TS)] ECR refresh job $JOB created -- waiting 15s"
                    sleep 15
                    for POD in $PULL_PODS; do
                      kubectl delete pod "$POD" -n cloudless --grace-period=0 \
                        && echo "[$(TS)] deleted $POD" \
                        || echo "[$(TS)] WARNING: could not delete $POD"
                    done
                  else
                    echo "[$(TS)] no ImagePullBackOff pods"
                  fi

                  # -- 2. Unknown-phase pods (node went offline) -- cluster-wide --
                  kubectl get pods --all-namespaces -o json 2>/dev/null \
                  | jq -r '.items[] | select(.status.phase == "Unknown") | [.metadata.namespace, .metadata.name] | @tsv' \
                  | grep -v "^kube-system" \
                  | while IFS=$(printf '\t') read -r ns pod; do
                    echo "[$(TS)] Unknown pod $ns/$pod -- force deleting"
                    kubectl delete pod "$pod" -n "$ns" --grace-period=0 --force 2>&1 \
                      && echo "[$(TS)] force-deleted $ns/$pod" \
                      || echo "[$(TS)] WARNING: could not delete $ns/$pod"
                  done || true

                  # -- 3. Stuck Terminating pods (>5 min) -- cluster-wide --
                  NOW=$(date -u +%s)
                  kubectl get pods --all-namespaces -o json 2>/dev/null \
                  | jq -r --argjson now "$NOW" '.items[] | select(.metadata.deletionTimestamp != null) | (.metadata.deletionTimestamp | gsub("\\.[0-9]+Z$";"Z") | fromdateiso8601) as $ts | select(($now - $ts) > 300) | [.metadata.namespace, .metadata.name, (($now - $ts) | tostring)] | @tsv' \
                  | grep -v "^kube-system" \
                  | while IFS=$(printf '\t') read -r ns pod age; do
                    echo "[$(TS)] Terminating $ns/$pod stuck ${age}s -- force deleting"
                    kubectl delete pod "$pod" -n "$ns" --grace-period=0 --force 2>&1 \
                      && echo "[$(TS)] force-deleted $ns/$pod" \
                      || echo "[$(TS)] WARNING: could not delete $ns/$pod"
                  done || true

                  # -- 4. CrashLoopBackOff (>5 restarts) -- cluster-wide --
                  kubectl get pods --all-namespaces -o json 2>/dev/null \
                  | jq -r '.items[] | .metadata.namespace as $ns | .metadata.name as $p | .status.containerStatuses[]? | select(.state.waiting.reason == "CrashLoopBackOff" and .restartCount > 5) | [$ns, $p, (.restartCount | tostring), .name] | @tsv' \
                  | grep -v "^kube-system" \
                  | while IFS=$(printf '\t') read -r ns pod restarts ctr; do
                    echo "[$(TS)] CrashLoopBackOff $ns/$pod ($ctr) restarts=$restarts -- deleting to reset backoff"
                    kubectl delete pod "$pod" -n "$ns" --grace-period=0 2>&1 \
                      && echo "[$(TS)] deleted $ns/$pod" \
                      || echo "[$(TS)] WARNING: could not delete $ns/$pod"
                  done || true

                  # -- 5. OOMKilled detection (log only) -- cluster-wide --
                  kubectl get pods --all-namespaces -o json 2>/dev/null \
                  | jq -r '.items[] | .metadata.namespace as $ns | .metadata.name as $p | .status.containerStatuses[]? | select(.lastState.terminated.reason == "OOMKilled") | [$ns, $p, (.restartCount | tostring), .name] | @tsv' \
                  | grep -v "^kube-system" \
                  | while IFS=$(printf '\t') read -r ns pod restarts ctr; do
                    echo "[$(TS)] OOMKilled $ns/$pod ($ctr) restarts=$restarts -- review memory limits"
                  done || true

                  echo "[$(TS)] auto-healer done"
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
