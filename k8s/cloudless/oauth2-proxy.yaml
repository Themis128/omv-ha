apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: cloudless
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      nodeSelector:
        kubernetes.io/hostname: omv
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --provider=oidc
            - --redirect-url=https://manage.cloudless.online/oauth2/callback
            - --upstream=http://cloudless-manager.cloudless.svc.cluster.local:3000
            - --http-address=0.0.0.0:4180
            - --scope=openid email profile
            - --email-domain=*
            - --skip-provider-button=true
            - --cookie-secure=true
            - --cookie-name=_oauth2_proxy_manager
          env:
            # Cognito OIDC config — values live in oauth2-proxy-config ConfigMap.
            # Create with: bash k8s/ha/scripts/setup-oauth2-proxy-cognito.sh
            - name: OAUTH2_PROXY_OIDC_ISSUER_URL
              valueFrom:
                configMapKeyRef:
                  name: oauth2-proxy-config
                  key: oidc_issuer_url
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: oauth2-proxy-config
                  key: client_id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secret
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secret
                  key: cookie-secret
          ports:
            - containerPort: 4180
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: cloudless
spec:
  selector:
    app: oauth2-proxy
  ports:
    - port: 4180
      targetPort: 4180
