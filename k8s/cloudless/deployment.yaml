apiVersion: v1
kind: Namespace
metadata:
  name: cloudless
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudless
  namespace: cloudless
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudless
  template:
    metadata:
      labels:
        app: cloudless
    spec:
      nodeSelector:
        kubernetes.io/hostname: omv  # pin to omv-main: Pi5 8GB, omv-ha is Pi4 1GB
      imagePullSecrets:
        - name: regcred-ecr
      containers:
        - name: cloudless
          image: 278585680617.dkr.ecr.us-east-1.amazonaws.com/cloudless-pi-app:latest
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 60
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 120
            timeoutSeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: pi-standby-aws-creds
          env:
            - name: SSM_PREFIX
              value: /cloudless/production
            - name: AWS_REGION
              value: us-east-1
            - name: STRIPE_TRANSACTIONS_TABLE
              value: cloudless-production-StripeTransactionsTable-nhtvnuew
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: cloudless
  namespace: cloudless
spec:
  selector:
    app: cloudless
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cloudless-gr-tls
  namespace: cloudless
spec:
  secretName: cloudless-gr-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - cloudless.gr
    - www.cloudless.gr
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudless
  namespace: cloudless
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - cloudless.gr
        - www.cloudless.gr
      secretName: cloudless-gr-tls
  rules:
    - host: cloudless.gr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cloudless
                port:
                  number: 3000
    - host: www.cloudless.gr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cloudless
                port:
                  number: 3000
