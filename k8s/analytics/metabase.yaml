###############################################################################
# Metabase — BI / visualization layer
# ARM64 image: custom Debian (eclipse-temurin:21-jre-jammy) for glibc/DuckDB compat
# Built on omv-main: /tmp/mb-build/Dockerfile → metabase-debian:v0.55
# Runs on omv (Pi5 8GB)
# URL: https://metrics.cloudless.online
###############################################################################

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: metabase-data
  namespace: analytics
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
  namespace: analytics
  labels:
    app: metabase
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metabase
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: metabase
    spec:
      nodeSelector:
        kubernetes.io/hostname: omv
      initContainers:
        - name: install-duckdb-driver
          image: alpine:3
          command: [sh, -c]
          args:
            - |
              wget -q https://github.com/motherduckdb/metabase_duckdb_driver/releases/download/0.4.1/duckdb.metabase-driver.jar \
                -O /plugins/duckdb.metabase-driver.jar &&
              echo "23a00260cc8d574e51c2e4cc35696e3f3da06ff7e52bb673a103da590f04fd0b  /plugins/duckdb.metabase-driver.jar" | sha256sum -c - &&
              chmod 777 /plugins && chmod 644 /plugins/duckdb.metabase-driver.jar &&
              echo "DuckDB driver ready"
          volumeMounts:
            - name: plugins
              mountPath: /plugins
      containers:
        - name: metabase
          image: metabase-debian:v0.55   # local image — built on omv-main, imported into k3s containerd
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: MB_DB_TYPE
              value: "h2"                   # built-in H2 for MVP; migrate to Postgres for prod
            - name: MB_DB_FILE
              value: "/metabase-data/metabase.db"
            - name: JAVA_OPTS
              value: "-Xmx512m -Xms256m -DMB_PLUGINS_DIR=/plugins"
            - name: MB_SITE_URL
              value: "https://metrics.cloudless.online"
            - name: MB_EMOJI_IN_LOGS
              value: "false"
            - name: MB_PLUGINS_DIR
              value: "/plugins"
          volumeMounts:
            - name: data
              mountPath: /metabase-data
            - name: plugins
              mountPath: /plugins
            - name: duckdb-data
              mountPath: /duckdb-data
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 240       # v0.55 Liquibase migrations slow on ARM
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 640Mi
            limits:
              cpu: 1000m
              memory: 1536Mi          # v0.55 Liquibase migrations need >768Mi on ARM
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: metabase-data
        - name: plugins
          emptyDir: {}
        - name: duckdb-data
          persistentVolumeClaim:
            claimName: duckdb-data
            readOnly: true

---
apiVersion: v1
kind: Service
metadata:
  name: metabase
  namespace: analytics
spec:
  selector:
    app: metabase
  ports:
    - port: 3000
      targetPort: 3000

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: metrics-tls
  namespace: analytics
spec:
  secretName: metrics-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - metrics.cloudless.online

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: metabase
  namespace: analytics
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts: [metrics.cloudless.online]
      secretName: metrics-tls
  rules:
    - host: metrics.cloudless.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: metabase
                port:
                  number: 3000
